<!doctype html>
<html lang="hu">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>"Nem" Fideszes Hírportál</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
</head>

<body>
  <div id="app">

    <div id="navbar"></div>

    <h1 class="mb-4" id="header">Hír szerkesztése</h1>
    <hr>


    <div id="main">

      <div class="row mb-3 align-items-center">
        <div class="col" id="imgContainer" style="position: relative;">
          <a id="deleteUpload"><i class="bi bi-x-circle-fill" style="filter: invert(1);"></i></a>
          <label for="imgInput" id="addImgButton">Kép hozzáadása</label>
          <input type="file" name="imgInput" id="imgInput" style="display: none;">
        </div>

        <div class="col">
          <textarea type="text" class="inputField" name="title" id="title" placeholder="Cím"></textarea>

          <input type="text" class="inputField" name="subtitle" id="subtitle" placeholder="Alcím">


          <div class="d-flex align-items-center">
            <select id="topic" class="inputField w-50 form-select">
              <option value="default" selected>Téma megadása</option>
            </select>
            <button id="deleteNewsBtn" type="button" data-bs-toggle="modal" data-bs-target="#deleteModal"
              class="btn btn-outline-danger w-50" style="height: fit-content; display: none;">Hír törlése</button>
          </div>
        </div>

      </div>
      <ul>
        <p id="imgError" class="inputError">Adj hozzá képet!</p>
        <p id="topicError" class="inputError">Adj meg egy témát!</p>
        <p id="titleError" class="inputError">Adj hozzá címet!</p>
        <p id="subtitleError" class="inputError">Adj hozzá alcímet!</p>
        <p id="contentError" class="inputError">Üres cikket nem tehetsz közzé!</p>
      </ul>



      <textarea id="contentEditor"></textarea>

      <div id="sendNewsBorder" class="text-center my-5 mx-auto d-block w-50">
        <button id="sendNews" type="button" class="btn btn-primary w-100">Közzététel</button>
      </div>


      <div class="modal fade" id="sendModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="modalLabel">Megerősítés</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              Biztosan közzéteszed a cikket?
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Mégse</button>
              <button type="button" class="btn btn-primary" id="sendModalBtn" style="width: 6.6rem;">Közzététel</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="label">Megerősítés</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              Biztosan törlöd a cikket?
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Mégse</button>
              <button type="button" class="btn btn-danger" id="deleteModalBtn" style="width: 6.6rem;">Hír
                törlése</button>
            </div>
          </div>
        </div>
      </div>


    </div>
  </div>
  <div id="editorHelper" style="display: none;"></div>
  <script>
    const mde = new EasyMDE({
      element: document.querySelector("#contentEditor"),
      uploadImage: true,
      minHeight: "800px"
    });

    const observer = new MutationObserver(() => {
      observer.disconnect();
      mde.value(document.querySelector("#editorHelper").innerHTML)
    });
    observer.observe(document.querySelector("#editorHelper"), { childList: true, subtree: true, characterData: true });

    mde.codemirror.on("change", () => {
      if (mde.value() !== "") {
        document.querySelector("#contentError").style.display = "none";
        document.querySelector("#editorHelper").innerHTML = mde.value()
      }
    });

    document.querySelector("#sendNews").addEventListener("click", () => {
      let errors = false
      if (!document.querySelector("#newsImg")) {
        errors = true
        document.querySelector("#imgError").style.display = "list-item"
      }
      if (document.querySelector("#topic").value === "default") {
        errors = true
        document.querySelector("#topicError").style.display = "list-item"
      }
      if (!document.querySelector("#title").value) {
        errors = true
        document.querySelector("#titleError").style.display = "list-item"
      }
      if (!document.querySelector("#subtitle").value) {
        errors = true
        document.querySelector("#subtitleError").style.display = "list-item"
      }
      if (!mde.value()) {
        errors = true
        document.querySelector("#contentError").style.display = "list-item"
      }


      if (!errors) bootstrap.Modal.getOrCreateInstance(document.querySelector("#sendModal")).show();
    })
  </script>
  <script type="module" src="/src/edit.ts"></script>
</body>

</html>
