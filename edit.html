<!doctype html>
<html lang="hu">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>"Nem" Fideszes Hírportál</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
</head>

<body>
  <div id="app">
    <div id="navbar"></div>
    <div id="main">
      <h1 class="mb-4">Hír szerkesztése</h1>
      <div class="row mb-3 align-items-center">
        <div class="col" id="newsImg">
          <label for="imgInput" id="addImg">Kép hozzáadása</label>
          <input type="file" name="imgInput" id="imgInput" style="display: none;">
        </div>
        <div class="col">
          <input type="text" class="inputField" name="title" id="title" placeholder="Cím">
          <input type="text" class="inputField" name="subtitle" id="subtitle" placeholder="Alcím">
        </div>
      </div>
      <textarea id="contentEditor"></textarea>
      <button id="sendNews" class="btn btn-primary">Közzététel</button>
    </div>
  </div>
  <div id="editorHelper" style="display: none;"></div>
  <script>
    const mde = new EasyMDE({ element: document.querySelector("#contentEditor"), uploadImage: true });

    setInterval(() => {
      document.querySelector("#editorHelper").innerHTML = mde.value()
    }, 1000);

  </script>
  <script type="module" src="/src/edit.ts"></script>
</body>

</html>
